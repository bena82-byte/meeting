<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutes AI Sales Mentor | Executive Edition</title>
    <!-- 
        Minutes AI Sales Mentor - MASTER VERSION
        Architectural Integrity:
        - Intelligence: Gemini 1.5 Flash (Production Model)
        - Communication: EmailJS (Full Integration)
        - UI: Tailwind CSS + Glassmorphism Architecture
        - Audio: Web Speech API + Web Audio API Visualizer
    -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .pulse-ring { 
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
        }
        
        @keyframes pulse { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: .5; transform: scale(1.05); } 
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .vol-bar { 
            transition: height 0.07s ease-out, background-color 0.2s ease; 
            min-height: 4px; 
            border-radius: 99px; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status-terminal {
            background: #0f172a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .fade-in-up {
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /**
         * MASTER CONFIGURATION - FULLY RESTORED
         */
        const CONFIG = {
            GEMINI_API_KEY: "AIzaSyAqqqiTHnkdBQipDwnsaXp93lUvx_IV3Ds",
            EMAILJS: {
                SERVICE_ID: "service_pzwnupb",
                TEMPLATE_ID: "template_azspfba",
                PUBLIC_KEY: "FjAY013_HlrpGCEZT"
            },
            USER_EMAIL: "bena82@gmail.com"
        };

        const SYSTEM_PROMPT = `
            # ROLE
            You are the "Minutes AI Sales Mentor & Executive Assistant." Elite sales coach and secretary.
            
            # OUTPUT SECTIONS
            1. EXECUTIVE SUMMARY: Professional overview and client sentiment.
            2. EXPLICIT ACTION ITEMS: Format: [Owner] - [Task] - [Due Date].
            3. PROACTIVE SUGGESTIONS: Value-add follow-up steps.
            4. PERFORMANCE MENTORSHIP & FEEDBACK: Analysis of Discovery, Objections, and Delivery.
        `;

        const Icons = {
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
            Square: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>,
            Trending: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>
        };

        function App() {
            const [transcript, setTranscript] = useState('');
            const [interimText, setInterimText] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState('idle');
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('input');
            const [debugLog, setDebugLog] = useState([]);
            const [vols, setVols] = useState(new Array(12).fill(0));

            const recognitionRef = useRef(null);
            const isActuallyRecording = useRef(false);
            const audioCtxRef = useRef(null);
            const analyzerRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                if (CONFIG.EMAILJS.PUBLIC_KEY) emailjs.init(CONFIG.EMAILJS.PUBLIC_KEY);
            }, []);

            const addLog = useCallback((msg) => {
                const time = new Date().toLocaleTimeString();
                setDebugLog(prev => [`[${time}] ${msg}`, ...prev].slice(0, 15));
            }, []);

            const startVisualizer = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioCtxRef.current.createMediaStreamSource(stream);
                    analyzerRef.current = audioCtxRef.current.createAnalyser();
                    analyzerRef.current.fftSize = 64;
                    const dataArr = new Uint8Array(analyzerRef.current.frequencyBinCount);
                    source.connect(analyzerRef.current);
                    
                    const updateVols = () => {
                        if (!isActuallyRecording.current) return;
                        analyzerRef.current.getByteFrequencyData(dataArr);
                        const nVols = Array.from(dataArr.slice(0, 12)).map(v => (v / 255) * 100);
                        setVols(nVols);
                        requestAnimationFrame(updateVols);
                    };
                    updateVols();
                } catch (e) {
                    addLog("Hardware Alert: " + e.message);
                }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setError("Speech Recognition is not natively supported in this browser. Please use Chrome.");
                    return;
                }

                const rec = new SpeechRecognition();
                rec.continuous = true;
                rec.interimResults = true;
                rec.lang = 'en-US';

                rec.onstart = () => {
                    isActuallyRecording.current = true;
                    addLog("Engine: LIVE");
                };

                rec.onresult = (e) => {
                    let f = ''; let i = '';
                    for (let idx = e.resultIndex; idx < e.results.length; ++idx) {
                        if (e.results[idx].isFinal) f += e.results[idx][0].transcript + ' ';
                        else i += e.results[idx][0].transcript;
                    }
                    if (f) setTranscript(prev => prev + f);
                    setInterimText(i); 
                };

                rec.onerror = (e) => {
                    addLog(`Engine Error: ${e.error}`);
                    if (e.error === 'network') {
                        addLog("HINT: Enable 'Online Speech Recognition' in Windows Privacy Settings.");
                    }
                };

                rec.onend = () => {
                    if (isActuallyRecording.current) {
                        setTimeout(() => {
                            try { if (isActuallyRecording.current) rec.start(); } catch(err) {}
                        }, 1000);
                    }
                };

                recognitionRef.current = rec;
            }, [addLog]);

            const toggleRecording = async () => {
                if (isRecording) {
                    isActuallyRecording.current = false;
                    recognitionRef.current?.stop();
                    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                    setIsRecording(false);
                    setInterimText('');
                    setVols(new Array(12).fill(0));
                    addLog("Stopped.");
                } else {
                    setError(null);
                    addLog("Waking mic...");
                    await startVisualizer();
                    try {
                        recognitionRef.current?.start();
                        setIsRecording(true);
                        isActuallyRecording.current = true;
                    } catch (err) { setError("Permission denied."); }
                }
            };

            const handleAnalysis = async () => {
                const fullContent = (transcript + interimText).trim();
                if (!fullContent) {
                    setError("No transcript captured. Record or paste text manually.");
                    return;
                }

                setIsLoading(true);
                setError(null);
                addLog("Connecting to Production AI Mentor...");

                try {
                    // MODEL FIX: Switched to production gemini-1.5-flash
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullContent }] }],
                                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                            })
                        }
                    );

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiResponse) {
                        setAnalysis(parseAnalysis(aiResponse));
                        setActiveTab('analysis');
                        addLog("Report Delivered.");
                    } else {
                        throw new Error("API returned no results.");
                    }
                } catch (err) {
                    addLog("AI Pipeline error.");
                    setError(`ANALYSIS FAILED: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const parseAnalysis = (text) => {
                const sections = { summary: "", actions: "", suggestions: "", feedback: "" };
                const pattern = /(?=1\.|2\.|3\.|4\.|SUMMARY|ACTION|SUGGESTION|FEEDBACK|MENTORSHIP)/i;
                const parts = text.split(pattern);
                parts.forEach(part => {
                    const clean = part.trim();
                    if (/1\.|SUMMARY/i.test(clean)) sections.summary = clean.replace(/.*SUMMARY:?|1\./i, '').trim();
                    if (/2\.|ACTION/i.test(clean)) sections.actions = clean.replace(/.*ACTION:?|2\./i, '').trim();
                    if (/3\.|SUGGESTION/i.test(clean)) sections.suggestions = clean.replace(/.*SUGGESTION:?|3\./i, '').trim();
                    if (/4\.|FEEDBACK|MENTOR/i.test(clean)) sections.feedback = clean.replace(/.*FEEDBACK:?|MENTORSHIP:?|4\./i, '').trim();
                });
                return sections;
            };

            const sendEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                addLog("Transmitting report...");
                
                const templateParams = {
                    summary: analysis.summary,
                    action_items: analysis.actions,
                    suggestions: analysis.suggestions,
                    mentorship: analysis.feedback,
                    transcript: transcript + interimText,
                    to_name: "Sales Professional",
                    user_email: CONFIG.USER_EMAIL
                };

                try {
                    await emailjs.send(CONFIG.EMAILJS.SERVICE_ID, CONFIG.EMAILJS.TEMPLATE_ID, templateParams);
                    setEmailStatus('sent');
                    addLog("Email success.");
                    setTimeout(() => setEmailStatus('idle'), 5000);
                } catch (err) {
                    addLog("Email failed. Check Template ID.");
                    setEmailStatus('error');
                    window.location.href = `mailto:${CONFIG.USER_EMAIL}?subject=Meeting Report&body=${encodeURIComponent(analysis.summary)}`;
                }
            };

            return (
                <div className="min-h-screen pb-20 px-4 pt-8 max-w-2xl mx-auto">
                    <header className="flex items-center justify-between mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100">
                                <Icons.Trending />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase italic leading-none">Minutes AI</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Master Edition</p>
                            </div>
                        </div>
                        <div className="flex bg-slate-200/60 rounded-2xl p-1.5 shadow-inner backdrop-blur-sm">
                            <button onClick={() => setActiveTab('input')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${activeTab === 'input' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REC</button>
                            <button onClick={() => analysis && setActiveTab('analysis')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${!analysis ? 'opacity-30' : ''} ${activeTab === 'analysis' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REPORT</button>
                        </div>
                    </header>

                    {error && (
                        <div className="mb-8 bg-red-50 border-2 border-red-100 rounded-3xl p-6 text-red-800 text-[11px] font-bold flex items-start gap-4 shadow-sm fade-in-up">
                            <div className="bg-red-100 p-2 rounded-full shrink-0"><Icons.Info /></div>
                            <div className="leading-relaxed uppercase tracking-tight">
                                <span className="block text-red-600 mb-1">System Alert</span>
                                {error}
                            </div>
                        </div>
                    )}

                    {activeTab === 'input' ? (
                        <div className="space-y-8 fade-in-up">
                            <div className="bg-white rounded-[4rem] shadow-sm border border-slate-200/60 p-16 text-center relative overflow-hidden group">
                                {isRecording && <div className="absolute inset-0 bg-indigo-500/[0.03] pulse-ring"></div>}
                                <div className="flex justify-center items-end gap-1.5 mb-10 h-16">
                                    {vols.map((v, i) => <div key={i} className="w-2.5 bg-indigo-500 vol-bar shadow-sm" style={{ height: `${Math.max(8, v)}%` }} />)}
                                </div>
                                <button onClick={toggleRecording} className={`w-52 h-52 rounded-full flex flex-col items-center justify-center transition-all duration-500 shadow-2xl mx-auto mb-10 relative z-10 active:scale-90 ${isRecording ? 'bg-indigo-600 ring-[12px] ring-indigo-50' : 'bg-slate-100 hover:bg-slate-200'}`}>
                                    {isRecording ? <div className="text-white scale-150"><Icons.Square /></div> : <div className="text-slate-400 scale-150"><Icons.Mic /></div>}
                                    <span className={`text-[12px] font-black uppercase tracking-[0.3em] mt-5 ${isRecording ? 'text-white' : 'text-slate-400'}`}>{isRecording ? "Stop" : "Record"}</span>
                                </button>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tighter uppercase italic">{isRecording ? "Listening..." : "New Session"}</h2>
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 overflow-hidden">
                                <div className="px-8 py-5 bg-slate-50/80 border-b flex justify-between items-center text-[11px] font-black text-slate-400 uppercase tracking-widest">
                                    <span>Live Transcript Feed</span>
                                    <button onClick={() => { setTranscript(''); setInterimText(''); }} className="hover:text-red-400 transition-all"><Icons.Trash /></button>
                                </div>
                                <textarea 
                                    className="w-full h-96 p-10 text-xl font-bold leading-relaxed text-slate-700 focus:outline-none resize-none bg-transparent scrollbar-hide"
                                    placeholder="Start talking... (If mic fails, use Win+H)"
                                    value={transcript + interimText}
                                    onChange={(e) => setTranscript(e.target.value)}
                                />
                                <div className="p-8 bg-slate-50/50 border-t">
                                    <button onClick={handleAnalysis} disabled={isLoading || isRecording || (!transcript && !interimText)} className="w-full bg-indigo-600 text-white font-black py-7 rounded-[2rem] uppercase tracking-[0.2em] text-xs shadow-2xl shadow-indigo-100 disabled:bg-slate-200">
                                        {isLoading ? "Consulting AI Mentor..." : "Generate Mentorship Report"}
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-[2rem] p-8 text-[11px] font-mono text-indigo-300/40 flex flex-col gap-2 shadow-2xl border border-slate-800/50">
                                <div className="flex items-center gap-3 border-b border-white/5 pb-4 mb-2">
                                    <div className={`w-2.5 h-2.5 rounded-full ${isRecording ? 'bg-indigo-500 animate-pulse' : 'bg-emerald-500'}`}></div>
                                    <span className="text-white font-bold tracking-[0.2em] uppercase">Engine Status Log</span>
                                </div>
                                <div className="space-y-1.5 h-32 overflow-y-auto scrollbar-hide">
                                    {debugLog.map((log, i) => <div key={i} className="animate-in slide-in-from-left-2">{`> ${log}`}</div>)}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-8 pb-20 fade-in-up">
                            <div className="flex justify-end sticky top-4 z-50">
                                <button onClick={sendEmail} disabled={emailStatus === 'sending'} className={`flex items-center gap-3 px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase transition-all shadow-lg active:scale-95 ${emailStatus === 'sent' ? 'bg-emerald-100 text-emerald-700' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                    {emailStatus === 'sending' ? 'Sending...' : emailStatus === 'sent' ? <><Icons.Check /> Sent</> : <><Icons.Mail /> Email Report</>}
                                </button>
                            </div>
                            {analysis && (
                                <>
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/80 p-10 relative overflow-hidden group">
                                        <span className="text-[11px] font-black text-indigo-600 uppercase tracking-[0.3em] block mb-6 border-b-2 border-indigo-50 pb-1 w-fit">1. Executive Summary</span>
                                        <p className="text-lg text-slate-800 leading-relaxed font-bold italic tracking-tight">"{analysis.summary}"</p>
                                    </div>
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/80 p-10">
                                        <span className="text-[11px] font-black text-emerald-600 uppercase tracking-[0.3em] block mb-6 border-b-2 border-emerald-50 pb-1 w-fit">2. Action Items</span>
                                        <div className="space-y-4 font-bold italic text-slate-700 text-base whitespace-pre-line leading-relaxed">{analysis.actions}</div>
                                    </div>
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/80 p-10">
                                        <span className="text-[11px] font-black text-amber-600 uppercase tracking-[0.3em] block mb-4 border-b-2 border-amber-50 pb-1 w-fit">3. Suggestions</span>
                                        <p className="text-base text-slate-700 leading-relaxed font-bold tracking-tight">{analysis.suggestions}</p>
                                    </div>
                                    <div className="bg-slate-900 rounded-[4rem] p-14 text-white shadow-2xl border-4 border-indigo-600/10">
                                        <span className="text-[11px] font-black text-indigo-400 uppercase tracking-[0.4em] block border-b border-white/10 pb-4 mb-8 italic flex items-center gap-3 tracking-tighter">
                                            <Icons.Trending /> Elite Sales Mentorship
                                        </span>
                                        <p className="text-2xl leading-[1.6] text-indigo-50 font-light italic whitespace-pre-line tracking-tighter">{analysis.feedback}</p>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
