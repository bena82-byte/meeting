<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutes AI Sales Mentor | Master Executive Edition</title>
    <!-- 
        Minutes AI Sales Mentor - PRODUCTION MASTER V1.6.1
        Critical Patches:
        1. JSON Payload Fix: Realigned v1beta endpoint with systemInstruction support.
        2. Model Alignment: gemini-1.5-flash (Stable Production).
        3. Hardware Metering: Web Audio API Visualizer for mic confirmation.
        4. Surface Resilience: Manual dictation fallback logic.
    -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .pulse-ring { 
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
        }
        
        @keyframes pulse { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: .5; transform: scale(1.05); } 
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .vol-bar { 
            transition: height 0.05s ease-out, background-color 0.2s ease; 
            min-height: 4px; 
            border-radius: 99px; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status-terminal {
            background: #0f172a;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }

        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-button {
            box-shadow: 0 0 20px var(--primary-glow);
        }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /**
         * MASTER CONFIGURATION - ALL KEYS INTEGRATED
         */
        const CONFIG = {
            GEMINI_API_KEY: "AIzaSyAqqqiTHnkdBQipDwnsaXp93lUvx_IV3Ds",
            EMAILJS: {
                SERVICE_ID: "service_pzwnupb",
                TEMPLATE_ID: "template_azspfba",
                PUBLIC_KEY: "FjAY013_HlrpGCEZT"
            },
            USER_EMAIL: "bena82@gmail.com"
        };

        const SYSTEM_PROMPT = `
            # ROLE
            You are the "Minutes AI Sales Mentor & Executive Assistant." Elite sales coach and executive secretary.
            
            # OUTPUT SECTIONS
            1. EXECUTIVE SUMMARY: Professional overview and client sentiment.
            2. EXPLICIT ACTION ITEMS: Format: [Owner] - [Task] - [Due Date]. Be specific.
            3. PROACTIVE SUGGESTIONS: 3 high-value follow-up steps.
            4. PERFORMANCE MENTORSHIP & FEEDBACK: Analysis of Discovery, Objections, and Delivery.
        `;

        const Icons = {
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
            Square: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>,
            Trending: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>
        };

        function App() {
            const [transcript, setTranscript] = useState('');
            const [interimText, setInterimText] = useState('');
            const [topic, setTopic] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState('idle');
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('input');
            const [debugLog, setDebugLog] = useState([]);
            const [vols, setVols] = useState(new Array(12).fill(0));
            const [hasNetworkError, setHasNetworkError] = useState(false);

            const recognitionRef = useRef(null);
            const isActuallyRecording = useRef(false);
            const audioCtxRef = useRef(null);
            const analyzerRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                if (CONFIG.EMAILJS.PUBLIC_KEY) emailjs.init(CONFIG.EMAILJS.PUBLIC_KEY);
            }, []);

            const addLog = useCallback((msg) => {
                const time = new Date().toLocaleTimeString();
                setDebugLog(prev => [`[${time}] ${msg}`, ...prev].slice(0, 15));
            }, []);

            const startVisualizer = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtxRef.current.state === 'suspended') await audioCtxRef.current.resume();

                    const source = audioCtxRef.current.createMediaStreamSource(stream);
                    analyzerRef.current = audioCtxRef.current.createAnalyser();
                    analyzerRef.current.fftSize = 64;
                    const dataArr = new Uint8Array(analyzerRef.current.frequencyBinCount);
                    source.connect(analyzerRef.current);
                    
                    const updateVols = () => {
                        if (!isActuallyRecording.current) return;
                        analyzerRef.current.getByteFrequencyData(dataArr);
                        const nVols = Array.from(dataArr.slice(0, 12)).map(v => (v / 200) * 100);
                        setVols(nVols);
                        requestAnimationFrame(updateVols);
                    };
                    updateVols();
                } catch (e) { addLog("Meter failed."); }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setError("Speech Recognition not supported. Use Chrome.");
                    return;
                }

                const rec = new SpeechRecognition();
                rec.continuous = true;
                rec.interimResults = true;
                rec.lang = 'en-US';

                rec.onstart = () => {
                    isActuallyRecording.current = true;
                    setHasNetworkError(false);
                    addLog("Mic: LIVE");
                };

                rec.onresult = (e) => {
                    let f = ''; let i = '';
                    for (let idx = e.resultIndex; idx < e.results.length; ++idx) {
                        if (e.results[idx].isFinal) f += e.results[idx][0].transcript + ' ';
                        else i += e.results[idx][0].transcript;
                    }
                    if (f) setTranscript(prev => prev + f);
                    setInterimText(i); 
                };

                rec.onerror = (e) => {
                    addLog(`Error: ${e.error}`);
                    if (e.error === 'network') {
                        setHasNetworkError(true);
                        addLog("Surface Block Detected. Use Win+H.");
                    }
                };

                rec.onend = () => {
                    if (isActuallyRecording.current) {
                        setTimeout(() => {
                            try { if (isActuallyRecording.current) rec.start(); } catch(err) {}
                        }, 1000);
                    }
                };

                recognitionRef.current = rec;
            }, [addLog]);

            const toggleRecording = async () => {
                if (isRecording) {
                    isActuallyRecording.current = false;
                    recognitionRef.current?.stop();
                    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                    setIsRecording(false);
                    setInterimText('');
                    setVols(new Array(12).fill(0));
                } else {
                    setError(null);
                    setHasNetworkError(false);
                    addLog("Waking hardware...");
                    await startVisualizer();
                    try {
                        recognitionRef.current?.start();
                        setIsRecording(true);
                        isActuallyRecording.current = true;
                    } catch (err) { setError("Mic Permission Denied."); }
                }
            };

            const handleAnalysis = async () => {
                const fullContent = (transcript + interimText).trim();
                if (!fullContent) {
                    setError("No content to analyze.");
                    return;
                }

                setIsLoading(true);
                setError(null);
                addLog("Connecting to AI...");

                try {
                    /** * CRITICAL JSON FIX: Using v1beta for systemInstruction support.
                     * Using gemini-1.5-flash for stable public API access.
                     */
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullContent }] }],
                                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                            })
                        }
                    );

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiResponse) {
                        setAnalysis(parseAnalysis(aiResponse));
                        setActiveTab('analysis');
                        addLog("Analysis Ready.");
                    } else {
                        throw new Error("Empty AI response.");
                    }
                } catch (err) {
                    addLog("AI Pipeline Fail.");
                    setError(`ANALYSIS FAILED: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const parseAnalysis = (text) => {
                const s = { summary: "", actions: "", suggestions: "", feedback: "" };
                const pattern = /(?=1\.|2\.|3\.|4\.|SUMMARY|ACTION|SUGGESTION|FEEDBACK|MENTORSHIP)/i;
                const p = text.split(pattern);
                p.forEach(part => {
                    const c = part.trim();
                    if (/1\.|SUMMARY/i.test(c)) s.summary = c.replace(/.*SUMMARY:?|1\./i, '').trim();
                    if (/2\.|ACTION/i.test(c)) s.actions = c.replace(/.*ACTION:?|2\./i, '').trim();
                    if (/3\.|SUGGESTION/i.test(c)) s.suggestions = c.replace(/.*SUGGESTION:?|3\./i, '').trim();
                    if (/4\.|FEEDBACK|MENTOR/i.test(c)) s.feedback = c.replace(/.*FEEDBACK:?|MENTORSHIP:?|4\./i, '').trim();
                });
                return s;
            };

            const sendEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                addLog("Mailing report...");
                
                const params = {
                    "Discussion Topic": topic || "Elite Sales Meeting",
                    summary: analysis.summary,
                    action_items: analysis.actions,
                    suggestions: analysis.suggestions,
                    mentorship: analysis.feedback,
                    transcript: transcript + interimText,
                    name: "Sales Professional",
                    email: CONFIG.USER_EMAIL
                };

                try {
                    await emailjs.send(CONFIG.EMAILJS.SERVICE_ID, CONFIG.EMAILJS.TEMPLATE_ID, params);
                    setEmailStatus('sent');
                    addLog("Email success.");
                    setTimeout(() => setEmailStatus('idle'), 5000);
                } catch (err) {
                    setEmailStatus('error');
                    window.location.href = `mailto:${CONFIG.USER_EMAIL}?subject=Meeting Report&body=${encodeURIComponent(analysis.summary)}`;
                }
            };

            return (
                <div className="min-h-screen pb-20 px-4 pt-8 max-w-2xl mx-auto">
                    <header className="flex items-center justify-between mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100"><Icons.Trending /></div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase italic leading-none">Minutes AI</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1 italic">Master Version 1.6.1</p>
                            </div>
                        </div>
                        <div className="flex bg-slate-200/60 rounded-2xl p-1.5 shadow-inner backdrop-blur-sm">
                            <button onClick={() => setActiveTab('input')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${activeTab === 'input' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REC</button>
                            <button onClick={() => analysis && setActiveTab('analysis')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${!analysis ? 'opacity-30 cursor-not-allowed' : ''} ${activeTab === 'analysis' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REPORT</button>
                        </div>
                    </header>

                    {error && (
                        <div className="mb-8 bg-red-50 border-2 border-red-100 rounded-3xl p-6 text-red-800 text-[11px] font-bold flex items-start gap-4 shadow-sm fade-in-up">
                            <div className="bg-red-100 p-2 rounded-full shrink-0"><Icons.Alert /></div>
                            <div className="leading-relaxed uppercase tracking-tight">
                                <span className="block text-red-600 mb-1 underline font-black uppercase tracking-widest">System Alert</span>
                                {error}
                            </div>
                        </div>
                    )}

                    {activeTab === 'input' ? (
                        <div className="space-y-8 fade-in-up">
                            <div className="bg-white rounded-[4rem] shadow-sm border border-slate-200/60 p-12 text-center relative overflow-hidden group">
                                {isRecording && <div className="absolute inset-0 bg-indigo-500/[0.03] pulse-ring"></div>}
                                <div className="flex justify-center items-end gap-1.5 mb-10 h-16">
                                    {vols.map((v, i) => (
                                        <div key={i} className="w-2.5 bg-indigo-500 vol-bar shadow-sm" style={{ height: `${Math.max(8, v)}%`, opacity: 0.2 + (v / 100) }} />
                                    ))}
                                </div>
                                <button onClick={toggleRecording} className={`w-52 h-52 rounded-full flex flex-col items-center justify-center transition-all duration-500 shadow-2xl mx-auto mb-10 relative z-10 active:scale-90 ${isRecording ? 'bg-indigo-600 ring-[12px] ring-indigo-50 glow-button' : 'bg-slate-100 ring-[12px] ring-slate-50 hover:bg-slate-200'}`}>
                                    {isRecording ? <div className="text-white scale-150"><Icons.Square /></div> : <div className="text-slate-400 scale-150"><Icons.Mic /></div>}
                                    <span className={`text-[12px] font-black uppercase tracking-[0.3em] mt-5 ${isRecording ? 'text-white' : 'text-slate-400'}`}>{isRecording ? "Stop" : "Record"}</span>
                                </button>
                                <input type="text" placeholder="Meeting Topic..." className="w-full max-w-xs mx-auto border-b-2 border-slate-100 focus:border-indigo-400 outline-none text-center bg-transparent py-2 text-sm font-bold text-slate-700 placeholder:text-slate-200 uppercase tracking-[0.2em]" value={topic} onChange={(e) => setTopic(e.target.value)} />
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 overflow-hidden relative">
                                {hasNetworkError && (
                                    <div className="absolute inset-x-0 top-14 bottom-0 bg-white/95 z-20 flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-500">
                                        <div className="bg-amber-100 p-4 rounded-full text-amber-600 mb-6"><Icons.Alert /></div>
                                        <h3 className="text-lg font-black text-slate-800 uppercase italic mb-2 tracking-tight underline">Hardware Fallback Mode</h3>
                                        <p className="text-sm text-slate-500 font-bold mb-8 leading-relaxed max-w-xs uppercase">Your network is blocking cloud transcription. Press **Win + H** to talk directly into the box.</p>
                                        <button onClick={() => setHasNetworkError(false)} className="px-10 py-5 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-xl active:scale-95 transition-all">Click to Dictate</button>
                                    </div>
                                )}
                                <div className="px-8 py-5 bg-slate-50/80 border-b flex justify-between items-center text-[11px] font-black text-slate-400 uppercase tracking-widest">
                                    <span>Live Transcript Feed</span>
                                    <button onClick={() => { setTranscript(''); setInterimText(''); }} className="hover:text-red-400 p-2"><Icons.Trash /></button>
                                </div>
                                <textarea className="w-full h-[400px] p-10 text-xl font-bold leading-relaxed text-slate-700 focus:outline-none resize-none bg-transparent scrollbar-hide" placeholder="Start talking or dictate..." value={transcript + interimText} onChange={(e) => setTranscript(e.target.value)} />
                                <div className="p-8 bg-slate-50/50 border-t">
                                    <button onClick={handleAnalysis} disabled={isLoading || isRecording} className="w-full bg-indigo-600 text-white font-black py-7 rounded-[2.5rem] uppercase tracking-[0.2em] text-xs shadow-2xl shadow-indigo-100 disabled:bg-slate-200 transition-all active:scale-[0.98]">
                                        {isLoading ? "Consulting AI Mentor..." : "Generate Final Report"}
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-[2.5rem] p-10 text-[11px] font-mono text-indigo-300/40 flex flex-col gap-3 shadow-2xl border border-slate-800/50">
                                <div className="flex items-center gap-3 border-b border-white/5 pb-5 mb-2">
                                    <div className={`w-2.5 h-2.5 rounded-full ${isRecording ? 'bg-indigo-500 animate-pulse' : 'bg-emerald-500'}`}></div>
                                    <span className="text-white font-bold tracking-[0.3em] uppercase italic">Engine Status Log</span>
                                </div>
                                <div className="space-y-2 h-36 overflow-y-auto scrollbar-hide">
                                    {debugLog.map((log, i) => <div key={i} className="animate-in slide-in-from-left-2 tracking-tighter opacity-70"> {log}</div>)}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-8 pb-20 fade-in-up">
                            <div className="flex justify-end sticky top-4 z-50">
                                <button onClick={sendEmail} disabled={emailStatus === 'sending'} className={`flex items-center gap-3 px-8 py-4 rounded-[2rem] text-[11px] font-black uppercase shadow-2xl active:scale-95 transition-all ${emailStatus === 'sent' ? 'bg-emerald-100 text-emerald-700 shadow-none' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                    {emailStatus === 'sending' ? 'Transmitting...' : emailStatus === 'sent' ? <><Icons.Check /> Report Delivered</> : <><Icons.Mail /> Email Executive Report</>}
                                </button>
                            </div>
                            {analysis && (
                                <>
                                    <div className="bg-white rounded-[3.5rem] shadow-sm border border-slate-200/80 p-12 relative overflow-hidden group shadow-indigo-100/20">
                                        <span className="text-[11px] font-black text-indigo-600 uppercase tracking-[0.3em] block mb-8 border-b-2 border-indigo-50 pb-2 w-fit">1. Executive Summary</span>
                                        <p className="text-xl text-slate-800 leading-relaxed font-bold italic tracking-tight italic">"{analysis.summary}"</p>
                                    </div>
                                    <div className="bg-white rounded-[3.5rem] shadow-sm border border-slate-200/80 p-12 shadow-indigo-100/20">
                                        <span className="text-[11px] font-black text-emerald-600 uppercase tracking-[0.3em] block mb-10 border-b-2 border-emerald-50 pb-2 w-fit">2. Action Items</span>
                                        <div className="space-y-4 font-bold italic text-slate-700 text-lg whitespace-pre-line leading-relaxed italic">{analysis.actions}</div>
                                    </div>
                                    <div className="bg-white rounded-[3.5rem] shadow-sm border border-slate-200/80 p-12 shadow-indigo-100/20">
                                        <span className="text-[11px] font-black text-amber-600 uppercase tracking-[0.3em] block mb-6 border-b-2 border-amber-50 pb-2 w-fit">3. Proactive Suggestions</span>
                                        <p className="text-lg text-slate-700 leading-relaxed font-bold tracking-tight italic">{analysis.suggestions}</p>
                                    </div>
                                    <div className="bg-slate-900 rounded-[4.5rem] p-16 text-white shadow-[0_40px_80px_rgba(79,70,229,0.3)] border-4 border-indigo-600/10">
                                        <span className="text-[11px] font-black text-indigo-400 uppercase tracking-[0.5em] block border-b border-white/10 pb-6 mb-10 italic flex items-center gap-4">
                                            <Icons.Trending /> Master Sales Mentorship
                                        </span>
                                        <p className="text-2xl leading-[1.7] text-indigo-50 font-light italic whitespace-pre-line tracking-tighter">{analysis.feedback}</p>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
