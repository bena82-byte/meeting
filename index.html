<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutes AI Sales Mentor | Elite Sales Coaching</title>
    <!-- 
        Minutes AI Sales Mentor
        Architectural Plan:
        1. State Management: React Signals/State for Transcript, Analysis, and System Health.
        2. Hardware Layer: Web Speech API for transcription + Web Audio API for volume visualization.
        3. Intelligence Layer: Google Gemini 2.5 Flash for rapid, deep sales analysis.
        4. Communication Layer: EmailJS for automated delivery of executive reports.
    -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .pulse-ring { 
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
        }
        
        @keyframes pulse { 
            0%, 100% { opacity: 1; transform: scale(1); } 
            50% { opacity: .5; transform: scale(1.05); } 
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .vol-bar { 
            transition: height 0.07s ease-out, background-color 0.2s ease; 
            min-height: 4px; 
            border-radius: 99px; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status-terminal {
            background: #0f172a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Animation for tab switching */
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        /**
         * MASTER CONFIGURATION
         * Integrating validated keys for Gemini and EmailJS.
         */
        const CONFIG = {
            GEMINI_API_KEY: "AIzaSyAqqqiTHnkdBQipDwnsaXp93lUvx_IV3Ds",
            EMAILJS: {
                SERVICE_ID: "service_pzwnupb",
                TEMPLATE_ID: "template_azspfba",
                PUBLIC_KEY: "FjAY013_HlrpGCEZT"
            },
            USER_EMAIL: "bena82@gmail.com"
        };

        const SYSTEM_PROMPT = `
            # ROLE
            You are the "Minutes AI Sales Mentor & Executive Assistant." You are an elite sales coach and a world-class executive secretary. 
            Your goal is to transform messy meeting transcripts into high-impact professional documentation and mentorship.

            # OUTPUT STRUCTURE (CRITICAL)
            1. EXECUTIVE SUMMARY: A 3-4 sentence professional overview. Note client sentiment (Hot/Warm/Cold) and core outcome.
            2. EXPLICIT ACTION ITEMS: Use the format: [Owner] - [Task] - [Due Date]. Be specific.
            3. PROACTIVE SUGGESTIONS: Provide 3 items that would "wow" the client or move the needle.
            4. PERFORMANCE MENTORSHIP & FEEDBACK: Analyze the user's Discovery questions, Objection handling, and overall Delivery/Tone.
        `;

        // Icons Components
        const Icons = {
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
            Square: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>,
            Trending: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>
        };

        function App() {
            // -- App State --
            const [transcript, setTranscript] = useState('');
            const [interimText, setInterimText] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState('idle'); // idle, sending, sent, error
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('input');
            const [debugLog, setDebugLog] = useState([]);
            const [vols, setVols] = useState(new Array(12).fill(0));

            // -- Refs for persistent objects --
            const recognitionRef = useRef(null);
            const isActuallyRecording = useRef(false);
            const audioCtxRef = useRef(null);
            const analyzerRef = useRef(null);
            const streamRef = useRef(null);
            const statusEndRef = useRef(null);

            /**
             * Initialize EmailJS on mount
             */
            useEffect(() => {
                if (CONFIG.EMAILJS.PUBLIC_KEY) {
                    emailjs.init(CONFIG.EMAILJS.PUBLIC_KEY);
                }
            }, []);

            /**
             * Auto-scroll status log
             */
            useEffect(() => {
                statusEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [debugLog]);

            /**
             * Logging utility with timestamp
             */
            const addLog = useCallback((msg) => {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                setDebugLog(prev => [...prev, `[${time}] ${msg}`].slice(-15));
            }, []);

            /**
             * Start the Web Audio API Visualizer
             */
            const startVisualizer = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    streamRef.current = stream;
                    
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioCtxRef.current.createMediaStreamSource(stream);
                    
                    analyzerRef.current = audioCtxRef.current.createAnalyser();
                    analyzerRef.current.fftSize = 64;
                    const dataArr = new Uint8Array(analyzerRef.current.frequencyBinCount);
                    source.connect(analyzerRef.current);
                    
                    const updateVols = () => {
                        if (!isActuallyRecording.current) return;
                        analyzerRef.current.getByteFrequencyData(dataArr);
                        // Map frequencies to 12 bars
                        const nVols = Array.from(dataArr.slice(0, 12)).map(v => (v / 255) * 100);
                        setVols(nVols);
                        requestAnimationFrame(updateVols);
                    };
                    updateVols();
                } catch (e) {
                    addLog("Hardware Visualizer failed: " + e.message);
                }
            };

            /**
             * Speech Recognition Setup
             */
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setError("Speech Recognition is not natively supported in this browser. Please use Chrome for the best experience.");
                    return;
                }

                const rec = new SpeechRecognition();
                rec.continuous = true;
                rec.interimResults = true;
                rec.lang = 'en-US';

                rec.onstart = () => {
                    isActuallyRecording.current = true;
                    addLog("Transcription Engine: LIVE");
                };

                rec.onresult = (e) => {
                    let f = ''; 
                    let i = '';
                    for (let idx = e.resultIndex; idx < e.results.length; ++idx) {
                        if (e.results[idx].isFinal) {
                            f += e.results[idx][0].transcript + ' ';
                        } else {
                            i += e.results[idx][0].transcript;
                        }
                    }
                    if (f) setTranscript(prev => prev + f);
                    setInterimText(i); 
                };

                rec.onerror = (e) => {
                    addLog(`Engine Error: ${e.error}`);
                    if (e.error === 'network') {
                        addLog("Connection issues detected. Ensure 'Online Speech Recognition' is enabled in Windows Privacy settings.");
                    }
                };

                rec.onend = () => {
                    if (isActuallyRecording.current) {
                        addLog("Engine timed out. Attempting hot-restart...");
                        setTimeout(() => {
                            try { 
                                if (isActuallyRecording.current) rec.start(); 
                            } catch(err) {
                                addLog("Restart blocked by browser.");
                            }
                        }, 800);
                    }
                };

                recognitionRef.current = rec;
            }, [addLog]);

            /**
             * Recording Toggle Logic
             */
            const toggleRecording = async () => {
                if (isRecording) {
                    addLog("Stopping session...");
                    isActuallyRecording.current = false;
                    recognitionRef.current?.stop();
                    if (streamRef.current) {
                        streamRef.current.getTracks().forEach(t => t.stop());
                    }
                    setIsRecording(false);
                    setInterimText('');
                    setVols(new Array(12).fill(0));
                } else {
                    setError(null);
                    addLog("Initializing audio hardware...");
                    await startVisualizer();
                    try {
                        recognitionRef.current?.start();
                        setIsRecording(true);
                        isActuallyRecording.current = true;
                    } catch (err) {
                        setError("Failed to start speech engine. Try refreshing the page.");
                    }
                }
            };

            /**
             * Gemini API AI Analysis
             */
            const handleAnalysis = async () => {
                const fullContent = (transcript + interimText).trim();
                if (!fullContent) {
                    setError("Nothing to analyze. Please speak into the mic or paste a transcript manually.");
                    return;
                }

                setIsLoading(true);
                setError(null);
                addLog("Encrypting and sending to AI Mentor...");

                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${CONFIG.GEMINI_API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullContent }] }],
                                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                            })
                        }
                    );

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiResponse) {
                        setAnalysis(parseAnalysis(aiResponse));
                        setActiveTab('analysis');
                        addLog("Report Analysis successfully delivered.");
                    } else {
                        throw new Error("AI engine returned a null response.");
                    }
                } catch (err) {
                    addLog("Analysis pipeline failed.");
                    setError(`ANALYSIS FAILED: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            /**
             * Report Section Parser
             */
            const parseAnalysis = (text) => {
                const sections = { summary: "", actions: "", suggestions: "", feedback: "" };
                const pattern = /(?=1\.|2\.|3\.|4\.|SUMMARY|ACTION|SUGGESTION|FEEDBACK|MENTORSHIP)/i;
                const parts = text.split(pattern);
                
                parts.forEach(part => {
                    const cleanPart = part.trim();
                    if (/1\.|SUMMARY/i.test(cleanPart)) sections.summary = cleanPart.replace(/.*SUMMARY:?|1\./i, '').trim();
                    if (/2\.|ACTION/i.test(cleanPart)) sections.actions = cleanPart.replace(/.*ACTION:?|2\./i, '').trim();
                    if (/3\.|SUGGESTION/i.test(cleanPart)) sections.suggestions = cleanPart.replace(/.*SUGGESTION:?|3\./i, '').trim();
                    if (/4\.|FEEDBACK|MENTOR/i.test(cleanPart)) sections.feedback = cleanPart.replace(/.*FEEDBACK:?|MENTORSHIP:?|4\./i, '').trim();
                });
                
                return sections;
            };

            /**
             * Automated Email Delivery via EmailJS
             */
            const sendEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                addLog("Packaging report for email delivery...");
                
                const templateParams = {
                    summary: analysis.summary,
                    action_items: analysis.actions,
                    suggestions: analysis.suggestions,
                    mentorship: analysis.feedback,
                    transcript: transcript + interimText,
                    to_name: "Sales Professional",
                    user_email: CONFIG.USER_EMAIL
                };

                try {
                    await emailjs.send(
                        CONFIG.EMAILJS.SERVICE_ID, 
                        CONFIG.EMAILJS.TEMPLATE_ID, 
                        templateParams
                    );
                    setEmailStatus('sent');
                    addLog("Email delivered to " + CONFIG.USER_EMAIL);
                    setTimeout(() => setEmailStatus('idle'), 5000);
                } catch (err) {
                    addLog("Email service failed.");
                    setEmailStatus('error');
                    
                    // Fallback to manual email client
                    const mailto = `mailto:${CONFIG.USER_EMAIL}?subject=Meeting Report&body=${encodeURIComponent(analysis.summary)}`;
                    window.location.href = mailto;
                }
            };

            return (
                <div className="min-h-screen pb-20 px-4 pt-8 max-w-2xl mx-auto">
                    {/* TOP NAVIGATION BAR */}
                    <header className="flex items-center justify-between mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-200">
                                <Icons.Trending />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase italic leading-none">Minutes AI</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Sales Mentor Pro</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-200/60 rounded-2xl p-1.5 shadow-inner backdrop-blur-sm">
                            <button 
                                onClick={() => setActiveTab('input')} 
                                className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${activeTab === 'input' ? 'bg-white shadow-md text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                Mic
                            </button>
                            <button 
                                onClick={() => analysis && setActiveTab('analysis')} 
                                className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 ${!analysis ? 'opacity-30 cursor-not-allowed' : ''} ${activeTab === 'analysis' ? 'bg-white shadow-md text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                Report
                            </button>
                        </div>
                    </header>

                    {/* GLOBAL ERROR NOTIFICATION */}
                    {error && (
                        <div className="mb-8 bg-red-50 border-2 border-red-100 rounded-[2rem] p-6 text-red-800 text-[11px] font-bold flex items-start gap-4 shadow-sm animate-in fade-in zoom-in duration-300">
                            <div className="bg-red-100 p-2 rounded-full shrink-0"><Icons.Info /></div>
                            <div className="leading-relaxed uppercase tracking-tight">
                                <span className="block text-red-600 mb-1">System Alert</span>
                                {error}
                            </div>
                        </div>
                    )}

                    {activeTab === 'input' ? (
                        <div className="space-y-8 fade-in-up">
                            {/* MAIN RECORDING CONTROL */}
                            <div className="bg-white rounded-[4rem] shadow-sm border border-slate-200/60 p-16 text-center relative overflow-hidden group">
                                {isRecording && <div className="absolute inset-0 bg-indigo-500/[0.03] pulse-ring"></div>}
                                
                                {/* Audio Level Meter */}
                                <div className="flex justify-center items-end gap-1.5 mb-10 h-16">
                                    {vols.map((v, i) => (
                                        <div 
                                            key={i} 
                                            className={`w-2.5 rounded-full vol-bar shadow-sm ${v > 50 ? 'bg-indigo-500' : 'bg-indigo-300'}`} 
                                            style={{ height: `${Math.max(8, v)}%` }}
                                        />
                                    ))}
                                </div>

                                <button 
                                    onClick={toggleRecording} 
                                    className={`w-52 h-52 rounded-full flex flex-col items-center justify-center transition-all duration-500 shadow-[0_20px_50px_rgba(79,70,229,0.2)] mx-auto mb-10 relative z-10 active:scale-90 ${isRecording ? 'bg-indigo-600 ring-[12px] ring-indigo-50' : 'bg-slate-100 ring-[12px] ring-slate-50 hover:bg-slate-200'}`}
                                >
                                    {isRecording ? (
                                        <div className="text-white scale-150 transition-transform"><Icons.Square /></div>
                                    ) : (
                                        <div className="text-slate-400 scale-150 transition-transform"><Icons.Mic /></div>
                                    )}
                                    <span className={`text-[12px] font-black uppercase tracking-[0.3em] mt-5 ${isRecording ? 'text-white' : 'text-slate-400'}`}>
                                        {isRecording ? "Stop" : "Record"}
                                    </span>
                                </button>
                                
                                <h2 className="text-2xl font-black text-slate-800 tracking-tighter uppercase italic">
                                    {isRecording ? "Listening to Deal..." : "Ready for Discovery"}
                                </h2>
                                <p className="text-sm text-slate-400 mt-3 px-10 leading-relaxed font-medium italic opacity-70">
                                    {isRecording ? "Words are being processed in real-time." : "Tap to begin the recording or paste text below."}
                                </p>
                            </div>

                            {/* TRANSCRIPT FEED SECTION */}
                            <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/60 overflow-hidden">
                                <div className="px-8 py-5 bg-slate-50/80 border-b border-slate-100 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2 h-2 rounded-full ${isRecording ? 'bg-indigo-500 animate-pulse' : 'bg-slate-300'}`}></div>
                                        <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Transcript Live Feed</span>
                                    </div>
                                    <button 
                                        onClick={() => { setTranscript(''); setInterimText(''); }} 
                                        className="text-slate-300 hover:text-red-400 p-2 transition-all active:rotate-12"
                                        title="Clear Transcript"
                                    >
                                        <Icons.Trash />
                                    </button>
                                </div>
                                <div className="relative group p-10 h-[380px] overflow-y-auto scrollbar-hide text-xl font-bold leading-relaxed text-slate-700 bg-transparent">
                                    <div className="opacity-90">
                                        {transcript}
                                        <span className="text-indigo-400 opacity-60 italic">{interimText}</span>
                                        {!transcript && !interimText && (
                                            <span className="text-slate-200 font-black uppercase tracking-tighter text-4xl block mt-4">
                                                Awaiting Data...
                                            </span>
                                        )}
                                    </div>
                                    {isRecording && <div className="absolute top-10 left-4 w-2 h-10 bg-indigo-500 rounded-full animate-pulse shadow-lg shadow-indigo-100"></div>}
                                </div>
                                <div className="p-8 bg-slate-50/50 border-t border-slate-100">
                                    <button 
                                        onClick={handleAnalysis} 
                                        disabled={isLoading || isRecording || (!transcript.trim() && !interimText.trim())} 
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-black py-7 rounded-[2rem] flex items-center justify-center gap-4 transition-all shadow-2xl shadow-indigo-100 uppercase tracking-[0.2em] text-xs"
                                    >
                                        {isLoading ? (
                                            <div className="flex items-center gap-3 animate-pulse">
                                                <div className="w-2 h-2 bg-white rounded-full"></div>
                                                Processing Logic...
                                            </div>
                                        ) : isRecording ? (
                                            "Stop Recording to Analyze"
                                        ) : (
                                            "Analyze & Get Mentorship"
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* SYSTEM STATUS LOG (TERMINAL VIEW) */}
                            <div className="status-terminal rounded-[2rem] p-8 text-[11px] font-medium mono text-indigo-300/40 flex flex-col gap-2 shadow-2xl border border-slate-800/50">
                                <div className="flex items-center justify-between border-b border-white/5 pb-4 mb-2">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2.5 h-2.5 rounded-full ${isRecording ? 'bg-indigo-500 animate-pulse' : 'bg-emerald-500'}`}></div>
                                        <span className="text-white font-bold tracking-[0.2em] uppercase">Engine Status Log</span>
                                    </div>
                                    <span className="text-white/20 text-[9px] uppercase tracking-widest italic">V.2.5.0 Master</span>
                                </div>
                                <div className="space-y-1.5 h-32 overflow-y-auto scrollbar-hide">
                                    {debugLog.map((log, i) => (
                                        <div key={i} className="animate-in slide-in-from-left-2 duration-300">
                                            <span className="text-indigo-500 mr-2">➜</span>
                                            {log}
                                        </div>
                                    ))}
                                    <div ref={statusEndRef}></div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-8 pb-20 fade-in-up">
                            {analysis && (
                                <>
                                    {/* ACTIONS AREA */}
                                    <div className="flex justify-between items-center bg-white p-5 rounded-3xl border border-slate-200 mb-4 sticky top-4 z-50 glass-panel shadow-lg">
                                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest pl-4">Report Active</p>
                                        <button 
                                            onClick={sendEmail} 
                                            disabled={emailStatus === 'sending'}
                                            className={`flex items-center gap-3 px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase transition-all shadow-lg active:scale-95 ${emailStatus === 'sent' ? 'bg-emerald-100 text-emerald-700 shadow-none' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-100'}`}
                                        >
                                            {emailStatus === 'sending' ? 'Transmitting...' : emailStatus === 'sent' ? <><Icons.Check /> Report Delivered</> : <><Icons.Mail /> Send Final Report</>}
                                        </button>
                                    </div>

                                    {/* 1. EXECUTIVE SUMMARY */}
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/80 p-10 relative overflow-hidden group">
                                        <div className="bg-indigo-50 w-24 h-24 rounded-full absolute -top-12 -right-12 group-hover:scale-110 transition-transform duration-700"></div>
                                        <span className="text-[11px] font-black text-indigo-600 uppercase tracking-[0.3em] block mb-8 border-b-2 border-indigo-50 pb-2 w-fit">1. Executive Summary</span>
                                        <p className="text-lg text-slate-800 leading-relaxed font-bold italic tracking-tight">"{analysis.summary}"</p>
                                    </div>

                                    {/* 2. ACTION ITEMS */}
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/80 p-10">
                                        <span className="text-[11px] font-black text-emerald-600 uppercase tracking-[0.3em] block mb-10 border-b-2 border-emerald-50 pb-2 w-fit">2. Action Items</span>
                                        <div className="space-y-5">
                                            {analysis.actions.split('\n').filter(l => l.trim().length > 3).map((line, i) => (
                                                <div key={i} className="flex gap-5 items-start bg-slate-50/80 p-6 rounded-[2rem] border border-slate-100 hover:shadow-md transition-all group">
                                                    <div className="text-emerald-500 shrink-0 mt-1 bg-white p-1.5 rounded-full shadow-sm group-hover:bg-emerald-500 group-hover:text-white transition-colors duration-300"><Icons.Check /></div>
                                                    <p className="text-base font-bold text-slate-800 leading-tight tracking-tight uppercase italic">{line.replace(/^[-*•]\s*/, '').replace(/\[|\]/g, '')}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 3. PROACTIVE SUGGESTIONS */}
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200/80 p-10">
                                        <span className="text-[11px] font-black text-amber-600 uppercase tracking-[0.3em] block mb-6 border-b-2 border-amber-50 pb-2 w-fit">3. Proactive Suggestions</span>
                                        <div className="text-base text-slate-700 leading-relaxed font-bold whitespace-pre-line tracking-tight px-4 border-l-4 border-amber-200 ml-2">
                                            {analysis.suggestions}
                                        </div>
                                    </div>

                                    {/* 4. PERFORMANCE MENTORSHIP (DARK THEME) */}
                                    <div className="bg-slate-900 rounded-[4rem] p-14 text-white shadow-[0_40px_80px_rgba(15,23,42,0.4)] border-4 border-indigo-600/10 relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-10 opacity-10 group-hover:rotate-12 transition-transform duration-700">
                                            <Icons.Trending />
                                        </div>
                                        <div className="flex items-center gap-4 mb-10 border-b border-white/10 pb-6">
                                            <div className="bg-indigo-600 p-2.5 rounded-xl"><Icons.Trending /></div>
                                            <span className="text-[13px] font-black text-indigo-400 uppercase tracking-[0.4em] italic">Sales Mentor Feedback</span>
                                        </div>
                                        <p className="text-2xl leading-[1.6] text-indigo-50 font-light italic whitespace-pre-line tracking-tight drop-shadow-sm">
                                            {analysis.feedback}
                                        </p>
                                        <div className="mt-12 flex items-center gap-5 pt-10 border-t border-white/5">
                                            <div className="w-14 h-14 rounded-full bg-indigo-600 flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-500/20">AI</div>
                                            <div>
                                                <p className="text-[10px] text-indigo-300 uppercase tracking-[0.3em] font-black mb-1 italic">Mentor Conclusion</p>
                                                <p className="text-xs text-slate-400 font-bold">Execution is the differentiator.</p>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
