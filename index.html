<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minutes AI Sales Mentor</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .pulse-ring { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .volume-bar { transition: height 0.1s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- RESTORED MASTER SECRETS ---
        const GEMINI_API_KEY = "AIzaSyAqqqiTHnkdBQipDwnsaXp93lUvx_IV3Ds"; 
        const EMAILJS_SERVICE_ID = "service_pzwnupb";
        const EMAILJS_PUBLIC_KEY = "FjAY013_HlrpGCEZT"; 
        const EMAILJS_TEMPLATE_ID = "template_azspfba";

        // Icons
        const IconMic = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconTrending = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconMail = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;

        const SYSTEM_PROMPT = `
        # ROLE
        You are the "Minutes AI Sales Mentor & Executive Assistant." Elite sales coach and organized secretary. 
        # OUTPUT SECTIONS
        1. EXECUTIVE SUMMARY: Professional overview and client sentiment.
        2. EXPLICIT ACTION ITEMS: Format: [Owner] - [Task] - [Due Date].
        3. PROACTIVE SUGGESTIONS: Value-add follow-up steps.
        4. PERFORMANCE MENTORSHIP & FEEDBACK: Analysis of Discovery, Objections, and Delivery.
        `;

        function App() {
            const [transcript, setTranscript] = useState('');
            const [interimText, setInterimText] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState(null); 
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('input');
            const [debugLog, setDebugLog] = useState([]);
            const [volume, setVolume] = useState(0);

            const recognitionRef = useRef(null);
            const isActuallyRecording = useRef(false);
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const dataArrayRef = useRef(null);
            const animationFrameRef = useRef(null);
            const retryCountRef = useRef(0);

            useEffect(() => {
                if (EMAILJS_PUBLIC_KEY) {
                    emailjs.init(EMAILJS_PUBLIC_KEY);
                }
                return () => {
                    if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
                };
            }, []);

            const addLog = useCallback((msg) => {
                setDebugLog(prev => [msg, ...prev].slice(0, 10));
            }, []);

            const updateVolume = () => {
                if (analyserRef.current && dataArrayRef.current) {
                    analyserRef.current.getByteFrequencyData(dataArrayRef.current);
                    let values = 0;
                    for (let i = 0; i < dataArrayRef.current.length; i++) {
                        values += dataArrayRef.current[i];
                    }
                    const average = values / dataArrayRef.current.length;
                    setVolume(average);
                    animationFrameRef.current = requestAnimationFrame(updateVolume);
                }
            };

            const startAudioVisualizer = async (stream) => {
                try {
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current = audioContextRef.current.createAnalyser();
                    analyserRef.current.fftSize = 256;
                    const bufferLength = analyserRef.current.frequencyBinCount;
                    dataArrayRef.current = new Uint8Array(bufferLength);
                    source.connect(analyserRef.current);
                    updateVolume();
                } catch (e) {
                    addLog("Visualizer failed");
                }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setError("Speech recognition is not supported in this browser. Please use Chrome.");
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    isActuallyRecording.current = true;
                    retryCountRef.current = 0;
                    addLog("Mic: LIVE");
                };

                recognition.onresult = (event) => {
                    let finalStr = '';
                    let interimStr = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalStr += event.results[i][0].transcript + ' ';
                        } else {
                            interimStr += event.results[i][0].transcript;
                        }
                    }
                    if (finalStr) setTranscript(prev => prev + finalStr);
                    setInterimText(interimStr);
                };

                recognition.onerror = (event) => {
                    addLog(`Status: ${event.error}`);
                    if (event.error === 'network') {
                        retryCountRef.current++;
                        if (retryCountRef.current > 3) {
                            setError("Consistent network error. If on Windows, check 'Online Speech Recognition' settings or try a different Wi-Fi.");
                        }
                    }
                    if (event.error === 'not-allowed') {
                        setError("Microphone access denied. Check site permissions.");
                        setIsRecording(false);
                        isActuallyRecording.current = false;
                    }
                };

                recognition.onend = () => {
                    if (isActuallyRecording.current) {
                        const delay = event?.error === 'network' ? 3000 : 500;
                        addLog("Restarting engine...");
                        setTimeout(() => {
                            try { if (isActuallyRecording.current) recognition.start(); }
                            catch (e) { addLog("Restart blocked."); }
                        }, delay);
                    }
                };

                recognitionRef.current = recognition;
            }, [addLog]);

            const toggleRecording = async () => {
                if (isRecording) {
                    isActuallyRecording.current = false;
                    recognitionRef.current?.stop();
                    setIsRecording(false);
                    setInterimText('');
                    setVolume(0);
                    if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
                } else {
                    setError(null);
                    setTranscript('');
                    setInterimText('');
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        startAudioVisualizer(stream);
                        // stream.getTracks().forEach(t => t.stop()); // Don't stop yet, we need it for visualizer
                        recognitionRef.current?.start();
                        setIsRecording(true);
                        isActuallyRecording.current = true;
                        addLog("Starting hardware...");
                    } catch (err) {
                        setError("Microphone permission failed. Tap 'Allow'.");
                    }
                }
            };

            const handleAnalysis = async () => {
                const fullText = (transcript + interimText).trim();
                if (!fullText) {
                    setError("No transcript found. Please talk or paste text.");
                    return;
                }
                
                setIsLoading(true);
                setError(null);
                addLog("Connecting to Gemini AI...");

                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullText }] }],
                                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                            })
                        }
                    );

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        setAnalysis(parseAnalysis(text));
                        setActiveTab('analysis');
                        addLog("Report Generated.");
                    } else {
                        throw new Error("Empty response from AI.");
                    }
                } catch (err) {
                    addLog("Analysis Failed.");
                    setError(`ANALYSIS ERROR: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const sendEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                addLog("Sending report...");
                
                const templateParams = {
                    summary: analysis.summary,
                    action_items: analysis.actions,
                    suggestions: analysis.suggestions,
                    mentorship: analysis.feedback,
                    name: "Sales Professional",
                    email: "bena82@gmail.com",
                    transcript: transcript + interimText
                };

                try {
                    if (!EMAILJS_SERVICE_ID || !EMAILJS_PUBLIC_KEY || !EMAILJS_TEMPLATE_ID) {
                        const content = `SUMMARY: ${analysis.summary}\n\nACTIONS: ${analysis.actions}\n\nSUGGESTIONS: ${analysis.suggestions}\n\nFEEDBACK: ${analysis.feedback}`;
                        window.location.href = `mailto:?subject=Sales Mentor Report&body=${encodeURIComponent(content)}`;
                        setEmailStatus('sent');
                        return;
                    }

                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                    setEmailStatus('sent');
                    addLog("Email Successful.");
                } catch (err) {
                    addLog("Email Error.");
                    setEmailStatus('error');
                }
            };

            const parseAnalysis = (text) => {
                const sections = { summary: "", actions: "", suggestions: "", feedback: "" };
                const parts = text.split(/(?=1\.|2\.|3\.|4\.|EXECUTIVE SUMMARY|EXPLICIT ACTION ITEMS|PROACTIVE SUGGESTIONS|PERFORMANCE MENTORSHIP)/i);
                parts.forEach(part => {
                    if (/EXECUTIVE SUMMARY|1\./i.test(part)) sections.summary = part.replace(/.*EXECUTIVE SUMMARY|1\./i, '').trim();
                    if (/EXPLICIT ACTION ITEMS|2\./i.test(part)) sections.actions = part.replace(/.*EXPLICIT ACTION ITEMS|2\./i, '').trim();
                    if (/PROACTIVE SUGGESTIONS|3\./i.test(part)) sections.suggestions = part.replace(/.*PROACTIVE SUGGESTIONS|3\./i, '').trim();
                    if (/PERFORMANCE MENTORSHIP|4\./i.test(part)) sections.feedback = part.replace(/.*PERFORMANCE MENTORSHIP|4\./i, '').trim();
                });
                return sections;
            };

            return (
                <div className="min-h-screen pb-10 px-4 pt-6 max-w-2xl mx-auto bg-slate-50 font-sans">
                    <header className="flex items-center justify-between mb-8">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                                <IconTrending />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter text-slate-800 uppercase italic">Minutes AI</h1>
                        </div>
                        <div className="flex bg-slate-200 rounded-xl p-1 shadow-inner">
                            <button onClick={() => setActiveTab('input')} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${activeTab === 'input' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>RECORDER</button>
                            <button onClick={() => analysis && setActiveTab('analysis')} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${!analysis ? 'opacity-30 pointer-events-none' : ''} ${activeTab === 'analysis' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REPORT</button>
                        </div>
                    </header>

                    {error && (
                        <div className="mb-6 bg-red-50 border-2 border-red-100 rounded-2xl p-5 text-red-800 text-[11px] font-black flex items-start gap-3 shadow-sm uppercase tracking-tight">
                            <span className="text-lg">⚠️</span> 
                            <p className="leading-snug">{error}</p>
                        </div>
                    )}

                    {activeTab === 'input' ? (
                        <div className="space-y-6 animate-in fade-in duration-300">
                            {/* Record Button UI */}
                            <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200 p-12 text-center relative overflow-hidden">
                                {isRecording && <div className="absolute inset-0 bg-indigo-500/5 pulse-ring"></div>}
                                
                                <div className="flex justify-center items-end gap-1 mb-4 h-8">
                                    {[...Array(8)].map((_, i) => (
                                        <div 
                                            key={i} 
                                            className="w-1 bg-indigo-400 rounded-full volume-bar" 
                                            style={{ height: isRecording ? `${Math.max(10, volume * (1 - Math.abs(i-3.5)/4))} %` : '4px' }}
                                        />
                                    ))}
                                </div>

                                <button onClick={toggleRecording} className={`w-48 h-48 rounded-full flex flex-col items-center justify-center transition-all shadow-2xl mx-auto mb-8 relative z-10 active:scale-95 ${isRecording ? 'bg-indigo-600 ring-8 ring-indigo-50' : 'bg-slate-100 ring-8 ring-slate-50 hover:bg-slate-200'}`}>
                                    {isRecording ? <div className="text-white scale-150"><IconSquare /></div> : <div className="text-slate-400 scale-150"><IconMic /></div>}
                                    <span className={`text-[11px] font-black uppercase tracking-widest mt-6 ${isRecording ? 'text-white' : 'text-slate-400'}`}>{isRecording ? "Stop Now" : "Record"}</span>
                                </button>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tight relative z-10 uppercase italic">{isRecording ? "Listening..." : "New Meeting"}</h2>
                            </div>

                            {/* Transcript Display */}
                            <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                                <div className="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center text-[10px] font-black text-slate-400 uppercase">
                                    <span>Live Transcript Feed</span>
                                    <button onClick={() => {setTranscript(''); setInterimText('');}} className="hover:text-red-400 transition-colors"><IconTrash /></button>
                                </div>
                                <div className="p-8 h-80 overflow-y-auto text-lg font-bold leading-relaxed text-slate-700 bg-transparent scrollbar-hide">
                                    {transcript + interimText || <span className="opacity-30 italic">Words will appear here as you speak...</span>}
                                </div>
                                <div className="p-5 bg-slate-50 border-t border-slate-100">
                                    <button onClick={handleAnalysis} disabled={isLoading || isRecording || (!transcript && !interimText)} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 text-white font-black py-6 rounded-[1.5rem] uppercase tracking-widest text-xs shadow-xl shadow-indigo-100">
                                        {isLoading ? "Analyzing..." : "Analyze & Get Mentorship"}
                                    </button>
                                </div>
                            </div>

                            {/* Debug Console */}
                            <div className="bg-slate-900 rounded-2xl p-6 text-[10px] font-mono text-indigo-300/60 flex flex-col gap-1.5 shadow-2xl border border-slate-800">
                                <span className="text-white font-bold border-b border-white/5 pb-2 mb-2 tracking-widest uppercase flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${isRecording ? 'bg-indigo-500 animate-pulse' : 'bg-emerald-500'}`}></span>
                                    System Status Log
                                </span>
                                {debugLog.map((log, i) => <div key={i} className="opacity-80">{`> ${log}`}</div>)}
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-6 pb-10 animate-in slide-in-from-bottom-6 duration-500">
                            {analysis && (
                                <>
                                    {/* Summary & Email Button */}
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                                        <div className="flex justify-between items-start mb-6 border-b border-slate-100 pb-4">
                                            <span className="text-[11px] font-black text-indigo-600 uppercase tracking-widest">1. Executive Summary</span>
                                            <button onClick={sendEmail} className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-[11px] font-black uppercase transition-all shadow-lg ${emailStatus === 'sent' ? 'bg-emerald-100 text-emerald-700 shadow-none' : 'bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95'}`}>
                                                {emailStatus === 'sending' ? 'Sending...' : emailStatus === 'sent' ? <><IconCheck /> Report Emailed</> : <><IconMail /> Email Report</>}
                                            </button>
                                        </div>
                                        <p className="text-base text-slate-700 leading-relaxed font-bold italic tracking-tight">"{analysis.summary}"</p>
                                    </div>

                                    {/* Action Items */}
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                                        <span className="text-[11px] font-black text-emerald-600 uppercase tracking-widest block mb-6 border-b-2 border-emerald-100 pb-1 w-fit">2. Action Items</span>
                                        <div className="space-y-4">
                                            {analysis.actions.split('\n').filter(l => l.trim()).map((line, i) => (
                                                <div key={i} className="flex gap-4 items-start bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                                    <div className="text-emerald-500 shrink-0 mt-1"><IconCheck /></div>
                                                    <p className="text-sm font-bold text-slate-800 leading-tight italic tracking-tight">{line.replace(/^[-*•]\s*/, '')}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Suggestions */}
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                                        <span className="text-[11px] font-black text-amber-600 uppercase tracking-widest block mb-4 border-b-2 border-amber-100 pb-1 w-fit">3. Proactive Suggestions</span>
                                        <p className="text-sm text-slate-700 leading-relaxed font-bold whitespace-pre-line tracking-tight">{analysis.suggestions}</p>
                                    </div>

                                    {/* Mentorship Feed */}
                                    <div className="bg-slate-900 rounded-[3rem] p-10 text-white shadow-2xl border-4 border-indigo-600/20">
                                        <span className="text-[11px] font-black text-indigo-400 uppercase tracking-widest block border-b border-white/10 pb-4 mb-8 italic flex items-center gap-3">
                                            <IconTrending /> Sales Mentorship Report
                                        </span>
                                        <p className="text-xl leading-relaxed text-indigo-50 font-light italic whitespace-pre-line tracking-tighter">{analysis.feedback}</p>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
