<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minutes AI | V3.0 Final Master</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; touch-action: manipulation; }
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; position: fixed; inset: 0; z-index: 9999; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #root:not(:empty) + .loading-screen { display: none; }
        input, textarea { font-size: 16px !important; }
        .vol-bar { transition: height 0.1s ease-out; min-height: 4px; border-radius: 99px; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 800; color: #6366f1; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em;">Loading V3.0 Master...</p>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ENVIRONMENT CONFIG
        const apiKey = ""; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";

        const CONFIG = {
            EMAILJS_SERVICE: "service_u54bof7",
            EMAILJS_TEMPLATE: "template_azspfba",
            EMAILJS_KEY: "FjAY013_HlrpGCEZT",
            TARGET_EMAIL: "ben.alexander@aplaceformom.com"
        };

        const SYSTEM_PROMPT = `
            # ROLE
            You are the "Minutes AI Sales Mentor." Analyze sales transcripts to generate:
            1. EXECUTIVE SUMMARY: High-level recap & sentiment.
            2. ACTION ITEMS: [Owner] - [Task] - [Due Date].
            3. PROACTIVE SUGGESTIONS: 2-3 specific follow-up items.
            4. PERFORMANCE MENTORSHIP: Analysis of Discovery, Objections, and Delivery.
        `;

        function App() {
            const [transcript, setTranscript] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [isRecording, setIsRecording] = useState(false);
            const [loading, setLoading] = useState(false);
            const [emailStatus, setEmailStatus] = useState('idle'); // idle, sending, sent, error
            const [error, setError] = useState(null);
            const [view, setView] = useState('input');
            const [vols, setVols] = useState(new Array(12).fill(0));

            const recognitionRef = useRef(null);
            const streamRef = useRef(null);
            const audioCtxRef = useRef(null);

            useEffect(() => {
                if (CONFIG.EMAILJS_KEY) emailjs.init(CONFIG.EMAILJS_KEY);
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const rec = new SpeechRecognition();
                    rec.continuous = true;
                    rec.interimResults = true;
                    rec.lang = 'en-US';
                    rec.onresult = (e) => {
                        let final = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                        }
                        if (final) setTranscript(prev => prev + final);
                    };
                    rec.onerror = (e) => console.error("Speech Error:", e.error);
                    rec.onend = () => { if (isRecording) try { rec.start(); } catch(err) {} };
                    recognitionRef.current = rec;
                }
            }, [isRecording]);

            const toggleRec = async () => {
                if (isRecording) {
                    recognitionRef.current?.stop();
                    streamRef.current?.getTracks().forEach(t => t.stop());
                    if (audioCtxRef.current) audioCtxRef.current.close();
                    setIsRecording(false);
                    setVols(new Array(12).fill(0));
                } else {
                    setError(null);
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        streamRef.current = stream;
                        
                        // Visualizer Setup
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                        const analyzer = audioCtxRef.current.createAnalyser();
                        audioCtxRef.current.createMediaStreamSource(stream).connect(analyzer);
                        const data = new Uint8Array(analyzer.frequencyBinCount);
                        
                        const update = () => {
                            if (stream.active) {
                                analyzer.getByteFrequencyData(data);
                                setVols(Array.from(data.slice(0, 12)).map(v => (v / 180) * 100));
                                requestAnimationFrame(update);
                            }
                        };
                        update();
                        
                        recognitionRef.current?.start();
                        setIsRecording(true);
                    } catch (e) {
                        setError("Microphone access blocked. Note: Speech-to-Text is often restricted in chat previews. It works best on your live GitHub site.");
                    }
                }
            };

            const analyze = async () => {
                if (!transcript.trim()) return;
                setLoading(true);
                setError(null);

                const fetchWithRetry = async (retry = 0) => {
                    const delays = [1000, 2000, 4000, 8000, 16000];
                    try {
                        const res = await fetch(`${API_URL}?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: transcript }] }],
                                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                            })
                        });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error?.message || "AI Error");
                        return data;
                    } catch (e) {
                        if (retry < 4) {
                            await new Promise(r => setTimeout(r, delays[retry]));
                            return fetchWithRetry(retry + 1);
                        }
                        throw e;
                    }
                };

                try {
                    const data = await fetchWithRetry();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (aiText) {
                        const sections = { summary: "", actions: "", suggestions: "", mentorship: "" };
                        const parts = aiText.split(/(?=1\.|2\.|3\.|4\.|SUMMARY|ACTION|SUGGESTION|MENTORSHIP|FEEDBACK)/i);
                        parts.forEach(p => {
                            const c = p.trim();
                            if (/1\.|SUMMARY/i.test(c)) sections.summary = c.replace(/.*SUMMARY:?|1\./i, '').trim();
                            if (/2\.|ACTION/i.test(c)) sections.actions = c.replace(/.*ACTION:?|2\./i, '').trim();
                            if (/3\.|SUGGESTION/i.test(c)) sections.suggestions = c.replace(/.*SUGGESTION:?|3\./i, '').trim();
                            if (/4\.|MENTORSHIP|FEEDBACK/i.test(c)) sections.mentorship = c.replace(/.*MENTORSHIP:?|FEEDBACK:?|4\./i, '').trim();
                        });
                        setAnalysis(sections);
                        setView('analysis');
                    }
                } catch (e) { setError(e.message); }
                setLoading(false);
            };

            const sendEmail = async () => {
                if (!analysis) return;
                setEmailStatus('sending');
                try {
                    // MAPS EXACTLY TO THE TEMPLATE IN YOUR SCREENSHOT
                    await emailjs.send(CONFIG.EMAILJS_SERVICE, CONFIG.EMAILJS_TEMPLATE, {
                        summary: analysis.summary,
                        action_items: analysis.actions,
                        suggestions: analysis.suggestions,
                        mentorship: analysis.mentorship,
                        transcript: transcript,
                        email: CONFIG.TARGET_EMAIL
                    });
                    setEmailStatus('sent');
                    setTimeout(() => setEmailStatus('idle'), 5000);
                } catch (e) {
                    console.error("Email Error:", e);
                    setEmailStatus('error');
                    // Fallback to mailto if EmailJS fails
                    window.location.href = `mailto:${CONFIG.TARGET_EMAIL}?subject=Meeting Recap&body=${encodeURIComponent(analysis.summary)}`;
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pt-4 pb-10 px-4">
                    <header className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                            </div>
                            <h1 className="font-black italic text-lg text-slate-800 tracking-tighter">MINUTES AI</h1>
                        </div>
                        <div className="flex bg-slate-200 p-1 rounded-xl shadow-inner">
                            <button onClick={() => setView('input')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all ${view === 'input' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REC</button>
                            <button onClick={() => analysis && setView('analysis')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all ${!analysis ? 'opacity-30' : ''} ${view === 'analysis' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>REPORT</button>
                        </div>
                    </header>

                    {error && <div className="mb-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-[10px] font-bold text-red-600 uppercase leading-tight fade-in">{error}</div>}

                    {view === 'input' ? (
                        <div className="space-y-4 flex-1 flex flex-col fade-in">
                            <div className="bg-white rounded-[3rem] border border-slate-100 p-10 text-center shadow-sm relative overflow-hidden group">
                                {isRecording && <div className="absolute inset-0 bg-indigo-500/5 animate-pulse"></div>}
                                <div className="flex justify-center items-end gap-1.5 mb-8 h-10">
                                    {vols.map((v, i) => <div key={i} className="w-2 bg-indigo-500 vol-bar shadow-sm" style={{ height: `${Math.max(15, v)}%`, opacity: 0.4 + (v/100) }} />)}
                                </div>
                                <button onClick={toggleRec} className={`w-36 h-36 rounded-full mx-auto flex flex-col items-center justify-center shadow-2xl transition-all active:scale-90 relative z-10 ${isRecording ? 'bg-indigo-600 ring-8 ring-indigo-50' : 'bg-slate-100'}`}>
                                    {isRecording ? <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="5" y="5" rx="2" ry="2"/></svg> : <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>}
                                    <span className={`text-[10px] font-black uppercase mt-2 tracking-widest ${isRecording ? 'text-white' : 'text-slate-400'}`}>{isRecording ? "Stop" : "Record"}</span>
                                </button>
                            </div>

                            <div className="bg-white rounded-3xl border border-slate-100 flex-1 flex flex-col overflow-hidden shadow-sm min-h-[300px]">
                                <div className="px-5 py-3 bg-slate-50 border-b flex justify-between items-center text-[9px] font-black uppercase text-slate-400 tracking-widest">
                                    <span>Live Transcription</span>
                                    <button onClick={() => setTranscript('')} className="text-red-300">Clear</button>
                                </div>
                                <textarea className="w-full flex-1 p-6 text-base font-bold text-slate-700 outline-none resize-none bg-transparent" placeholder="Words will appear here as you speak..." value={transcript} onChange={(e) => setTranscript(e.target.value)} />
                                <div className="p-4 bg-slate-50 border-t">
                                    <button onClick={analyze} disabled={loading || !transcript.trim()} className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-[10px] shadow-lg shadow-indigo-100 disabled:opacity-20 transition-all">
                                        {loading ? <div className="flex items-center justify-center gap-2"><div className="spinner"></div>Analysing...</div> : "Generate Mentor Report"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-4 pb-10 fade-in">
                            <button onClick={sendEmail} disabled={emailStatus === 'sending'} className={`w-full py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl transition-all active:scale-95 ${emailStatus === 'sent' ? 'bg-emerald-500 text-white' : 'bg-indigo-600 text-white'}`}>
                                {emailStatus === 'sending' ? 'Transmitting...' : emailStatus === 'sent' ? 'Recap Sent Successfully' : emailStatus === 'error' ? 'Delivery Error - Retry?' : 'Email Executive Recap'}
                            </button>
                            <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                                <h3 className="text-[9px] font-black text-indigo-600 uppercase mb-4 border-b-2 border-indigo-50 pb-1 inline-block">1. Executive Summary</h3>
                                <p className="text-base text-slate-800 font-bold italic leading-relaxed italic">"{analysis.summary}"</p>
                            </div>
                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="text-[9px] font-black text-emerald-600 uppercase mb-4 border-b-2 border-emerald-50 pb-1 inline-block">2. Action Items</h3>
                                <div className="text-sm font-bold text-slate-700 whitespace-pre-line leading-relaxed italic">{analysis.actions}</div>
                            </div>
                            <div className="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl border-4 border-indigo-600/10">
                                <h3 className="text-[9px] font-black text-indigo-400 uppercase mb-6 tracking-widest border-b border-white/10 pb-2">Sales Mentor Insights</h3>
                                <p className="text-xl font-light italic leading-relaxed text-indigo-50 tracking-tight whitespace-pre-line">{analysis.mentorship}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
